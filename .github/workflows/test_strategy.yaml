name: Test Strategy - Orphan Branch Data

on:
  workflow_dispatch:
  push:
    branches:
      - test-gh-actions-strategy

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4
        with:
          path: main_repo
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate new data point
        run: |
          # Generate data to a temp file outside the repo structure to survive checkout
          # Use runner.temp to be safe and avoid relative path confusion
          python main_repo/test_strategy/generate_dummy_data.py "${{ runner.temp }}/new_data_point.csv"
          cat "${{ runner.temp }}/new_data_point.csv"

      - name: Checkout (or create) orphan statistics branch
        run: |
          cd main_repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Try to fetch the branch, if it fails, we create it
          git fetch origin test-stats-data:test-stats-data || echo "Branch does not exist yet"
          
          # Switch to the branch or create orphan if it doesn't exist
          if git rev-parse --verify test-stats-data >/dev/null 2>&1; then
            git checkout test-stats-data
          else
            git checkout --orphan test-stats-data
            git rm -rf .
            # Create empty file with header if this is the very first run
            echo "date,value" > dummy_stats.csv
          fi

      - name: Append data and Push
        run: |
          cd main_repo
          # Append the new data line (skipping header from the temp file)
          tail -n +2 "${{ runner.temp }}/new_data_point.csv" >> dummy_stats.csv
          
          git add dummy_stats.csv
          git commit -m "Update dummy statistics"
          git push origin test-stats-data
